[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*
python_classes = Test*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_event_loop_policy = asyncio.DefaultEventLoopPolicy
timeout = 300
addopts = -v --tb=short --strict-markers
markers =
    web: Web端测试
    desktop: 桌面端测试
    functional: 功能测试
    performance: 性能测试
    slow: 慢速测试
